services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      AI_PROVIDER: ${AI_PROVIDER:-gemini}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-3.5-flash}
      GEMINI_FALLBACK_MODEL: ${GEMINI_FALLBACK_MODEL:-gemini-3.1-flash-lite}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      XBLOOM_DEVICE_CACHE: /app/data/.xbloom-device.json
      XBLOOM_DATABASE: /app/data/xbloom.db
      XBLOOM_BLUETOOTH_BRIDGE_URL: http://host.docker.internal:8767
      XBLOOM_BRIDGE_TOKEN: ${XBLOOM_BRIDGE_TOKEN:-xbloom-local-bridge}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8766:8766"
    volumes:
      - xbloom-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8766/api/health')"]
      interval: 15s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - "5173:80"
    restart: unless-stopped

volumes:
  xbloom-data:
